services:
  - type: web
    name: buybox-tracker-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: MY_SELLER_NAME
        value: Bonolo Online

      # Auto-link the free Render PostgreSQL database
      - key: DATABASE_URL
        fromDatabase:
          name: buybox-tracker-db
          property: connectionString

      - key: WHATSAPP_PHONE
        sync: false
      - key: CALLMEBOT_APIKEY
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      - key: ALERT_LOSING
        value: "true"
      - key: ALERT_WINNING
        value: "true"
      - key: ALERT_AMAZON
        value: "true"

databases:
  - name: buybox-tracker-db
    plan: free
    databaseName: buybox_tracker
    user: buybox
